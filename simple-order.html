<!DOCTYPE html>
<html>
<head>
    <title>SwiftInk Order Form</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #0f172a;
            color: white;
            cursor: pointer;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>SwiftInk Order Form</h1>
    <form id="orderForm">
        <input type="text" id="clientName" placeholder="Full Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <select id="serviceType" required>
            <option value="">Select Service</option>
            <option value="Business Cards">Business Cards</option>
            <option value="Eulogies">Eulogies</option>
            <option value="Wedding Cards">Wedding Cards</option>
            <option value="Posters">Posters</option>
            <option value="Banners">Banners</option>
            <option value="Flyers">Flyers</option>
        </select>
        <input type="text" id="quantity" placeholder="Quantity" required>
        <input type="date" id="deadline" required>
        <textarea id="message" rows="4" placeholder="Special instructions..."></textarea>
        <button type="submit">Submit Order</button>
    </form>
    <div id="result"></div>

    <script>
        
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyBTWBCzMXz1K25zEckP3gN3F9E5PphwbyY",
            authDomain: "swiftink-64a05.firebaseapp.com",
            projectId: "swiftink-64a05",
            storageBucket: "swiftink-64a05.firebasestorage.app",
            messagingSenderId: "693593977308",
            appId: "1:693593977308:web:34ed74e69ee90141a31f19",
            measurementId: "G-DXFNJ7GEHM"

        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "Saving order...";
            resultDiv.className = "";
            
            try {
                const orderData = {
                    clientName: document.getElementById('clientName').value,
                    phone: document.getElementById('phone').value,
                    serviceType: document.getElementById('serviceType').value,
                    quantity: document.getElementById('quantity').value,
                    deadline: document.getElementById('deadline').value,
                    message: document.getElementById('message').value,
                    status: 'new',
                    createdAt: new Date().toISOString(),
                    source: 'simple-form'
                };
                
                const docRef = await db.collection('orders').add(orderData);
                resultDiv.innerHTML = `✅ Order saved successfully! Order ID: ${docRef.id}<br><br>We'll contact you shortly.`;
                resultDiv.className = "success";
                document.getElementById('orderForm').reset();
                
                // Also show WhatsApp option
                const whatsappMsg = `Hi SwiftInk, I have a new order:\nName: ${orderData.clientName}\nService: ${orderData.serviceType}\nQuantity: ${orderData.quantity}`;
                resultDiv.innerHTML += `<br><br><a href="https://wa.me/254111506710?text=${encodeURIComponent(whatsappMsg)}" target="_blank" style="display: inline-block; background: #25D366; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">📱 Send via WhatsApp also</a>`;
                
            } catch(error) {
                resultDiv.innerHTML = `❌ Error: ${error.message}<br><br>Please try again or contact us directly on WhatsApp.`;
                resultDiv.className = "error";
                console.error("Error saving order:", error);
            }
        });
    </script>
</body>
</html>
